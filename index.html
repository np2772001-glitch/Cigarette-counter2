<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smoke Log</title>
<meta name="theme-color" content="#e8a020">
<link rel="manifest" href="manifest.json">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0d0b; --amber: #e8a020; --amber-dim: #7a5210; --smoke: #b0a898; --ash: #4a4540; --red: #c94040; }
  html, body { background: var(--bg); color: var(--smoke); font-family: 'Courier New', Courier, monospace; min-height: 100vh; }
  .app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; gap: 30px; }
  .header { text-align: center; }
  .title { font-size: 13px; font-weight: bold; letter-spacing: 0.35em; color: var(--amber-dim); text-transform: uppercase; }
  .date-title { font-size: 11px; color: var(--ash); margin-top: 6px; }
  .count { font-family: 'Arial Black', sans-serif; font-size: 90px; line-height: 1; color: var(--amber); text-shadow: 0 0 40px rgba(232,160,32,0.2); }
  
  /* 10-COLUMN GRID */
  .cig-row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; width: 100%; max-width: 220px; }
  .cig-icon { width: 100%; height: 6px; border-radius: 1px; background: linear-gradient(to right, #c8a060 70%, var(--red) 70%); }

  .controls { display: flex; flex-direction: column; align-items: center; gap: 25px; }
  .btn-row { display: flex; align-items: center; gap: 30px; }
  .add-btn { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--amber); background: transparent; color: var(--amber); font-size: 36px; cursor: pointer; }
  .sub-btn { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--ash); background: transparent; color: var(--ash); font-size: 28px; cursor: pointer; }
  
  /* HISTORY SECTION */
  .history-container { width: 100%; max-width: 280px; margin-top: 20px; border-top: 1px solid var(--ash); padding-top: 20px; }
  .history-header { font-size: 10px; letter-spacing: 0.2em; color: var(--ash); text-transform: uppercase; margin-bottom: 12px; text-align: center; }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item { display: flex; justify-content: space-between; font-size: 12px; color: var(--smoke); border-bottom: 1px hideen var(--ash); padding-bottom: 4px; }
  .history-date { color: var(--ash); }
  .history-val { font-weight: bold; color: var(--amber-dim); }
</style>
</head>
<body>
<div class="app">
  <div class="header"><div class="title">Smoke Log</div><div id="dateDisplay" class="date-title"></div></div>
  
  <div class="count" id="countDisplay">0</div>
  <div id="cigRow" class="cig-row"></div>

  <div class="controls">
    <div class="btn-row">
      <button class="sub-btn" onclick="updateCount(-1)">−</button>
      <button class="add-btn" onclick="updateCount(1)">+</button>
    </div>
  </div>

  <div class="history-container">
    <div class="history-header">Daily History</div>
    <div id="historyList" class="history-list"></div>
  </div>
</div>

<script>
  // Data structure: { "2026-04-03": 21, "2026-04-02": 18 }
  let logData = JSON.parse(localStorage.getItem('smokeLogData') || '{}');
  
  function getToday() { return new Date().toISOString().slice(0, 10); }

  function updateCount(val) {
    const today = getToday();
    logData[today] = (logData[today] || 0) + val;
    if (logData[today] < 0) logData[today] = 0;
    saveAndRender();
  }

  function saveAndRender() {
    localStorage.setItem('smokeLogData', JSON.stringify(logData));
    render();
  }

  function render() {
    const today = getToday();
    const count = logData[today] || 0;
    
    // Update main display
    document.getElementById('countDisplay').textContent = count;
    document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    // Update Grid
    const row = document.getElementById('cigRow');
    row.innerHTML = '';
    for(let i=0; i < count; i++) {
      const d = document.createElement('div');
      d.className = 'cig-icon';
      row.appendChild(d);
    }

    // Update History List
    const historyList = document.getElementById('historyList');
    historyList.innerHTML = '';
    
    // Sort dates descending (newest first), excluding today
    const sortedDates = Object.keys(logData).sort().reverse();
    
    sortedDates.forEach(date => {
      const item = document.createElement('div');
      item.className = 'history-item';
      
      const displayDate = date === today ? "Today" : date;
      
      item.innerHTML = `
        <span class="history-date">${displayDate}</span>
        <span class="history-val">${logData[date]}</span>
      `;
      historyList.appendChild(item);
    });
  }

  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  render();
</script>
</body>
</html>
