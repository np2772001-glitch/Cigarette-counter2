<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smoke Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0d0b;
    --amber: #e8a020;
    --amber-dim: #7a5210;
    --smoke: #b0a898;
    --ash: #4a4540;
    --red: #c94040;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--smoke);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
  }

  .app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 48px 32px 56px;
  }

  .header { text-align: center; }

  .title {
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.35em;
    color: var(--amber-dim);
    text-transform: uppercase;
  }

  .date {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ash);
    margin-top: 6px;
  }

  .counter-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .count-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ash);
    text-transform: uppercase;
  }

  .count {
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-size: clamp(100px, 30vw, 160px);
    line-height: 1;
    color: var(--amber);
    text-shadow: 0 0 60px rgba(232, 160, 32, 0.3);
    user-select: none;
  }

  .count.bump { animation: bump 0.18s ease; }

  @keyframes bump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .cig-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 5px;
    max-width: 260px;
    min-height: 24px;
  }

  .cig-icon {
    width: 18px;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #c8a060 70%, var(--red) 70%);
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
  }

  .cig-icon.show { opacity: 1; transform: scale(1); }

  .last-info {
    text-align: center;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .last-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ash);
    text-transform: uppercase;
  }

  .last-time {
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--smoke);
  }

  .last-elapsed {
    font-size: 12px;
    color: var(--amber-dim);
    letter-spacing: 0.12em;
  }

  .no-data {
    font-size: 12px;
    color: var(--ash);
    letter-spacing: 0.1em;
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 36px;
  }

  .add-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 2px solid var(--amber);
    background: transparent;
    color: var(--amber);
    font-size: 40px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .add-btn:active {
    transform: scale(0.93);
    background: rgba(232,160,32,0.08);
    box-shadow: 0 0 40px rgba(232,160,32,0.25);
  }

  .sub-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--ash);
    background: transparent;
    color: var(--ash);
    font-size: 32px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .sub-btn:active {
    transform: scale(0.93);
    border-color: var(--red);
    color: var(--red);
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--ash);
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 8px 16px;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn:active { color: var(--red); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="title">Smoke Log</div>
    <div class="date" id="dateDisplay"></div>
  </div>

  <div class="counter-area">
    <div class="count-label">today</div>
    <div class="count" id="countDisplay">0</div>
    <div class="cig-row" id="cigRow"></div>
  </div>

  <div class="last-info" id="lastInfo">
    <div class="no-data">no cigarettes yet</div>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button class="sub-btn" onclick="removeCigarette()" aria-label="Remove cigarette">−</button>
      <button class="add-btn" onclick="addCigarette()" aria-label="Add cigarette">+</button>
    </div>
    <button class="reset-btn" onclick="resetDay()">reset day</button>
  </div>

</div>
<script>
  let state = load();

  function load() {
    try {
      const saved = JSON.parse(localStorage.getItem('smokeLog') || '{}');
      const today = todayKey();
      if (saved.date !== today) return { date: today, count: 0, lastTime: null };
      return saved;
    } catch { return { date: todayKey(), count: 0, lastTime: null }; }
  }

  function save() {
    localStorage.setItem('smokeLog', JSON.stringify(state));
  }

  function todayKey() {
    return new Date().toISOString().slice(0, 10);
  }

  function addCigarette() {
    state.count++;
    state.lastTime = Date.now();
    save();
    render();
    const el = document.getElementById('countDisplay');
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  function removeCigarette() {
    if (state.count <= 0) return;
    state.count--;
    if (state.count === 0) state.lastTime = null;
    save();
    render();
  }

  function resetDay() {
    if (state.count === 0) return;
    if (!confirm('Reset today\'s count to zero?')) return;
    state.count = 0;
    state.lastTime = null;
    save();
    render();
  }

  function render() {
    document.getElementById('dateDisplay').textContent =
      new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    document.getElementById('countDisplay').textContent = state.count;

    const row = document.getElementById('cigRow');
    const shown = Math.min(state.count, 20);
    while (row.children.length < shown) {
      const d = document.createElement('div');
      d.className = 'cig-icon';
      row.appendChild(d);
      requestAnimationFrame(() => requestAnimationFrame(() => d.classList.add('show')));
    }
    while (row.children.length > shown) row.removeChild(row.lastChild);

    const info = document.getElementById('lastInfo');
    if (!state.lastTime) {
      info.innerHTML = '<div class="no-data">no cigarettes yet</div>';
    } else {
      const t = new Date(state.lastTime);
      const timeStr = t.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
      const elapsed = elapsedStr(Date.now() - state.lastTime);
      info.innerHTML = `
        <div class="last-label">last cigarette</div>
        <div class="last-time">${timeStr}</div>
        <div class="last-elapsed" id="elapsedEl">${elapsed} ago</div>
      `;
    }
  }

  function elapsedStr(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}m`;
    const h = Math.floor(m / 60);
    const rm = m % 60;
    return rm > 0 ? `${h}h ${rm}m` : `${h}h`;
  }

  setInterval(() => {
    if (state.lastTime) {
      const el = document.getElementById('elapsedEl');
      if (el) el.textContent = elapsedStr(Date.now() - state.lastTime) + ' ago';
    }
    if (state.date !== todayKey()) {
      state = { date: todayKey(), count: 0, lastTime: null };
      save();
      render();
    }
  }, 30000);

  render();
</script>
</body>
</html>
